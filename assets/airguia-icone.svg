<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" width="110" height="110" role="img" aria-label="AirGuia icone">
  <!-- fundo quadrado arredondado branco -->
  <rect x="0" y="0" width="110" height="110" rx="24" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- painel esquerdo do mapa -->
  <rect x="16" y="24" width="22" height="62" rx="4" fill="#6B8E61" opacity="0.75"/>
  <!-- painel central do mapa -->
  <rect x="44" y="17" width="22" height="76" rx="4" fill="#4A6741"/>
  <!-- painel direito do mapa -->
  <rect x="72" y="24" width="22" height="62" rx="4" fill="#6B8E61" opacity="0.75"/>
  <!-- linhas de dobra -->
  <line x1="43" y1="17" x2="43" y2="93" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="66" y1="17" x2="66" y2="93" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <!-- pin de localizacao -->
  <circle cx="55" cy="48" r="9" fill="white"/>
  <line x1="55" y1="57" x2="55" y2="67" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="55" cy="48" r="4" fill="#4A6741"/>
</svg>
