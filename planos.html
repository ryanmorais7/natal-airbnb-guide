<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Escolha seu plano — Zamio Guias</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: { primary: "#4A6741", "primary-light": "#6B8E61" },
      fontFamily: { serif: ["'DM Serif Display'","serif"], sans: ["'Nunito Sans'","sans-serif"] }
    }
  }
}
</script>
<style>
body { font-family: 'Nunito Sans', sans-serif; }
.plan-card { cursor:pointer; transition:all .2s; border:2px solid #f3f4f6; }
.plan-card:hover { transform:translateY(-3px); border-color:#d1d5db; }
.plan-card.destaque { border-color:#4A6741; }

/* Toggle */
.toggle-track { width:48px; height:26px; background:#d1d5db; border-radius:999px; position:relative; cursor:pointer; transition:background .2s; }
.toggle-track.on { background:#4A6741; }
.toggle-thumb { width:20px; height:20px; background:#fff; border-radius:50%; position:absolute; top:3px; left:3px; transition:left .2s; box-shadow:0 1px 4px rgba(0,0,0,.2); }
.toggle-track.on .toggle-thumb { left:25px; }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-stone-100 to-stone-50 flex flex-col items-center justify-center p-4 py-12">

<div class="w-full max-w-2xl">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-14 h-14 bg-primary rounded-2xl mb-4 shadow-xl shadow-primary/20">
      <span class="material-icons-outlined text-white" style="font-size:26px">cottage</span>
    </div>
    <h1 class="font-serif text-2xl text-gray-900 mb-1">Escolha seu plano</h1>
    <p class="text-sm text-gray-500">Cancele quando quiser, sem multa</p>
  </div>

  <!-- Step progress -->
  <div class="flex items-center justify-center mb-10">
    <div class="flex flex-col items-center">
      <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-xs font-extrabold shadow-sm">
        <span class="material-icons-outlined" style="font-size:14px">check</span>
      </div>
      <span class="text-[10px] font-bold text-primary mt-1">Conta</span>
    </div>
    <div class="w-10 h-0.5 bg-primary mb-4"></div>
    <div class="flex flex-col items-center">
      <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-xs font-extrabold">2</div>
      <span class="text-[10px] font-bold text-primary mt-1">Plano</span>
    </div>
    <div class="w-10 h-0.5 bg-gray-200 mb-4"></div>
    <div class="flex flex-col items-center">
      <div class="w-8 h-8 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center text-xs font-extrabold">3</div>
      <span class="text-[10px] font-bold text-gray-400 mt-1">Pagamento</span>
    </div>
  </div>

  <!-- Toggle mensal / anual -->
  <div class="flex items-center justify-center gap-3 mb-8">
    <span id="lbl-mensal" class="text-sm font-bold text-gray-900">Mensal</span>
    <div class="toggle-track" id="toggle" onclick="alternarPeriodo()">
      <div class="toggle-thumb"></div>
    </div>
    <span id="lbl-anual" class="text-sm font-bold text-gray-400">Anual</span>
    <span id="badge-economia" class="hidden bg-green-100 text-green-700 text-xs font-extrabold px-2.5 py-1 rounded-full">economize 20%</span>
  </div>

  <!-- ══════════════════════════════════════════════════════
       PLANOS — Edite os valores no objeto JS abaixo (PLANOS)
       ══════════════════════════════════════════════════════ -->
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-6" id="planos-grid"></div>
  <!-- ══════════════════════════════════════════════════════ -->

  <p class="text-center text-xs text-gray-400">
    <span class="material-icons-outlined align-middle" style="font-size:13px">lock</span>
    Pagamento seguro · Cancele quando quiser · 7 dias grátis
  </p>

</div>

<script>
const SB_URL = 'https://xhtkwtiskqyiohurwkxg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhodGt3dGlza3F5aW9odXJ3a3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjkyMDcsImV4cCI6MjA5NzA0NTIwN30.b815Q3Nv1UaqxaLinyY7nmOJrw5EOGkIJ3HlkdYn0uQ';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

const isInvite = new URLSearchParams(location.search).get('invite') === '1';

async function initPlanos() {
  if (isInvite) {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { location.href = 'login.html'; return; }
    sessionStorage.setItem('zreg_email',  session.user.email);
    sessionStorage.setItem('zreg_invite', '1');
  } else {
    if (!sessionStorage.getItem('zreg_email')) { location.href = 'cadastro.html'; return; }
  }
  renderPlanos();
}

initPlanos();

// ═══════════════════════════════════════════════════
// EDITE OS PLANOS AQUI
// ═══════════════════════════════════════════════════
const PLANOS = [
  {
    id:          'individual',
    nome:        'Individual',
    descricao:   '1 propriedade',
    precoMensal: '34,90',
    precoAnual:  '27,90',   // cobrado como R$ 334,80/ano
    economia:    'R$ 84 de economia no ano',
    destaque:    false,
    badge:       null,
    itens: [
      { ok: true,  texto: '1 propriedade' },
      { ok: true,  texto: 'Guia digital completo' },
      { ok: true,  texto: 'Checklist de limpeza + WhatsApp' },
      { ok: true,  texto: 'Cartão imprimível com QR duplo' },
      { ok: true,  texto: 'Wi-Fi QR Code' },
      { ok: true,  texto: 'Sistema de acesso (5 tipos)' },
      { ok: true,  texto: 'Temas de cores personalizáveis' },
      { ok: false, texto: 'Múltiplas propriedades' },
      { ok: false, texto: 'Suporte prioritário' },
    ],
  },
  {
    id:          'pro',
    nome:        'Pro',
    descricao:   'Até 5 propriedades',
    precoMensal: '69,90',
    precoAnual:  '54,90',   // cobrado como R$ 658,80/ano
    economia:    'R$ 180 de economia no ano',
    destaque:    true,
    badge:       'Mais popular',
    itens: [
      { ok: true, texto: 'Até 5 propriedades' },
      { ok: true, texto: 'Guia digital completo' },
      { ok: true, texto: 'Checklist de limpeza + WhatsApp' },
      { ok: true, texto: 'Cartão imprimível com QR duplo' },
      { ok: true, texto: 'Wi-Fi QR Code' },
      { ok: true, texto: 'Sistema de acesso (5 tipos)' },
      { ok: true, texto: 'Temas de cores personalizáveis' },
      { ok: true, texto: 'Múltiplas propriedades' },
      { ok: true, texto: 'Suporte prioritário' },
    ],
  },
];
// ═══════════════════════════════════════════════════

let anual = false;

function alternarPeriodo() {
  anual = !anual;
  const toggle = document.getElementById('toggle');
  const lblM   = document.getElementById('lbl-mensal');
  const lblA   = document.getElementById('lbl-anual');
  const badge  = document.getElementById('badge-economia');
  toggle.classList.toggle('on', anual);
  lblM.className  = 'text-sm font-bold ' + (anual ? 'text-gray-400' : 'text-gray-900');
  lblA.className  = 'text-sm font-bold ' + (anual ? 'text-gray-900' : 'text-gray-400');
  badge.classList.toggle('hidden', !anual);
  renderPlanos();
}

function renderPlanos() {
  const grid = document.getElementById('planos-grid');
  grid.innerHTML = PLANOS.map(p => {
    const preco    = anual ? p.precoAnual : p.precoMensal;
    const economia = anual ? '<p class="text-xs text-green-600 font-bold mt-0.5">' + p.economia + '</p>' : '';
    const badgeHtml = p.badge
      ? '<div class="absolute -top-3.5 left-1/2 -translate-x-1/2 bg-primary text-white text-[10px] font-extrabold uppercase tracking-widest px-4 py-1 rounded-full shadow whitespace-nowrap">' + p.badge + '</div>'
      : '';
    const itens = p.itens.map(i =>
      '<li class="flex items-center gap-2 text-sm ' + (i.ok ? 'text-gray-700' : 'text-gray-300') + '">'
      + '<span class="material-icons-outlined ' + (i.ok ? 'text-primary' : 'text-gray-200') + '" style="font-size:15px">'
      + (i.ok ? 'check_circle' : 'remove_circle_outline') + '</span>' + i.texto + '</li>'
    ).join('');
    const btnClass = p.destaque
      ? 'w-full py-3 rounded-xl bg-primary text-white font-bold text-sm hover:bg-primary-light transition-all shadow-lg shadow-primary/20'
      : 'w-full py-3 rounded-xl border-2 border-primary text-primary font-bold text-sm hover:bg-primary hover:text-white transition-all';

    return '<div class="plan-card bg-white rounded-2xl p-6 flex flex-col relative shadow-sm ' + (p.destaque ? 'destaque shadow-primary/10' : '') + '" onclick="escolher(\'' + p.id + '\',\'' + p.nome + '\',\'' + preco + '\')">'
      + badgeHtml
      + '<div class="mb-4">'
      + '<p class="text-xs font-extrabold uppercase tracking-widest ' + (p.destaque ? 'text-primary' : 'text-gray-400') + ' mb-0.5">' + p.nome + '</p>'
      + '<p class="font-serif text-4xl text-gray-900 font-bold">R$ ' + preco + '<span class="text-base font-sans font-semibold text-gray-400">/mês</span></p>'
      + '<p class="text-xs text-gray-400 mt-0.5">' + (anual ? 'Cobrado anualmente' : 'Cobrado mensalmente') + '</p>'
      + economia
      + '</div>'
      + '<p class="text-xs font-bold text-gray-400 mb-3 flex items-center gap-1"><span class="material-icons-outlined" style="font-size:13px">home</span>' + p.descricao + '</p>'
      + '<ul class="space-y-2 flex-1 mb-5">' + itens + '</ul>'
      + '<div class="bg-green-50 border border-green-100 rounded-xl px-3 py-2 flex items-center gap-2 mb-4">'
      + '<span class="text-base">🎉</span>'
      + '<span class="text-xs font-bold text-green-700">7 dias grátis para testar</span>'
      + '</div>'
      + '<button class="' + btnClass + '" onclick="escolher(\'' + p.id + '\',\'' + p.nome + '\',\'' + preco + '\')">'
      + 'Escolher ' + p.nome + '</button>'
      + '</div>';
  }).join('');
}

function escolher(id, nome, preco) {
  const periodo = anual ? 'anual' : 'mensal';
  sessionStorage.setItem('zreg_plano_id',      id);
  sessionStorage.setItem('zreg_plano_nome',    nome);
  sessionStorage.setItem('zreg_plano_preco',   preco);
  sessionStorage.setItem('zreg_plano_periodo', periodo);
  setTimeout(() => location.href = 'pagamento.html', 150);
}
</script>
</body>
</html>
