<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Entrar — Painel do Anfitrião</title>
<link href="assets/airguia-favicon.png" rel="icon" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: { primary: "#4A6741", "primary-light": "#6B8E61" },
      fontFamily: { serif: ["'DM Serif Display'","serif"], sans: ["'Nunito Sans'","sans-serif"] }
    }
  }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/login.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-stone-100 to-stone-50 flex items-center justify-center p-4">

<div class="w-full max-w-sm">
  <!-- Logo & header -->
  <div class="text-center mb-8">
    <img src="assets/airguia-logo-horizontal.png" alt="AirGuia" class="h-12 mx-auto mb-4">
    <h1 id="page-title" class="font-serif text-2xl text-gray-900 mb-1">Painel do Anfitrião</h1>
    <p id="page-subtitle" class="text-sm text-gray-500">Entre para editar seu guia</p>
  </div>

  <div id="error-msg" class="hidden mb-5 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm flex items-center gap-2">
    <span class="material-icons-outlined text-base">error_outline</span>
    <span id="error-text"></span>
  </div>

  <!-- Tela de carregamento da demo -->
  <div id="demo-loading-view" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-10 text-center">
    <span class="material-icons-outlined text-primary spin" style="font-size:34px">autorenew</span>
    <p class="text-sm text-gray-500 mt-4">Preparando o painel de demonstração...</p>
  </div>

  <div id="login-view">
    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">E-mail</label>
          <input id="email" type="email" placeholder="seu@email.com" autocomplete="email"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/25 focus:border-primary transition-all bg-gray-50 focus:bg-white"/>
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Senha</label>
          <div class="relative">
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/25 focus:border-primary transition-all bg-gray-50 focus:bg-white pr-10"/>
            <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <span id="pwd-icon" class="material-icons-outlined text-base">visibility</span>
            </button>
          </div>
        </div>
      </div>

      <button id="btn-login" onclick="doLogin()"
        class="w-full mt-6 bg-primary text-white font-bold py-3.5 rounded-xl hover:bg-primary-light active:scale-[.98] transition-all flex items-center justify-center gap-2 text-sm shadow-lg shadow-primary/20">
        <span class="material-icons-outlined text-base">login</span>
        Entrar
      </button>
    </div>

    <div class="mt-5">
      <div class="flex items-center gap-3 mb-4">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-xs text-gray-400 font-medium">ou</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>
      <button id="btn-demo" type="button" onclick="entrarDemo()"
        class="flex items-center justify-center gap-2 w-full py-3 rounded-xl border-2 border-primary/20 text-primary font-bold text-sm hover:bg-primary/5 transition-all">
        <span class="material-icons-outlined text-base">visibility</span>
        Ver demo do guia
      </button>
      <p class="text-center text-xs text-gray-400 mt-2">Veja como o hóspede enxerga o guia</p>
    </div>

    <p class="text-center text-sm text-gray-500 mt-5">
      Não tem conta?
      <a href="cadastro.html" class="text-primary font-bold hover:underline">Criar agora →</a>
    </p>
  </div>
  <p class="text-center text-xs text-gray-400 mt-3">AirGuia · Plataforma para Anfitriões</p>
</div>

<script src="js/login.js"></script>
</body>
</html>
