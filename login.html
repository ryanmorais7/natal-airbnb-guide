<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Entrar — Painel do Anfitrião</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: { primary: "#4A6741", "primary-light": "#6B8E61" },
      fontFamily: { serif: ["'DM Serif Display'","serif"], sans: ["'Nunito Sans'","sans-serif"] }
    }
  }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: 'Nunito Sans', sans-serif; }
  @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  .spin { animation: spin .8s linear infinite; display:inline-block; }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-stone-100 to-stone-50 flex items-center justify-center p-4">

<div class="w-full max-w-sm">
  <!-- Logo & header -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-2xl mb-4 shadow-xl shadow-primary/20">
      <span class="material-icons-outlined text-white" style="font-size:28px">cottage</span>
    </div>
    <h1 class="font-serif text-2xl text-gray-900 mb-1">Painel do Anfitrião</h1>
    <p class="text-sm text-gray-500">Entre para editar seu guia</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <div id="error-msg" class="hidden mb-5 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm flex items-center gap-2">
      <span class="material-icons-outlined text-base">error_outline</span>
      <span id="error-text"></span>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">E-mail</label>
        <input id="email" type="email" placeholder="seu@email.com" autocomplete="email"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/25 focus:border-primary transition-all bg-gray-50 focus:bg-white"/>
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Senha</label>
        <div class="relative">
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/25 focus:border-primary transition-all bg-gray-50 focus:bg-white pr-10"/>
          <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <span id="pwd-icon" class="material-icons-outlined text-base">visibility</span>
          </button>
        </div>
      </div>
    </div>

    <button id="btn-login" onclick="doLogin()"
      class="w-full mt-6 bg-primary text-white font-bold py-3.5 rounded-xl hover:bg-primary-light active:scale-[.98] transition-all flex items-center justify-center gap-2 text-sm shadow-lg shadow-primary/20">
      <span class="material-icons-outlined text-base">login</span>
      Entrar
    </button>
  </div>

  <p class="text-center text-xs text-gray-400 mt-6">Zamio Guias · Plataforma para Anfitriões</p>
</div>

<script>
const SB_URL = 'https://xhtkwtiskqyiohurwkxg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhodGt3dGlza3F5aW9odXJ3a3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjkyMDcsImV4cCI6MjA5NzA0NTIwN30.b815Q3Nv1UaqxaLinyY7nmOJrw5EOGkIJ3HlkdYn0uQ';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

// Already logged in? Go straight to panel
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) location.href = 'painel.html';
});

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-login');

  hideError();
  if (!email || !password) { showError('Preencha e-mail e senha.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="material-icons-outlined text-base spin">refresh</span> Entrando...';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    showError('E-mail ou senha incorretos.');
    btn.disabled = false;
    btn.innerHTML = '<span class="material-icons-outlined text-base">login</span> Entrar';
  } else {
    location.href = 'painel.html';
  }
}

function showError(msg) {
  document.getElementById('error-text').textContent = msg;
  document.getElementById('error-msg').classList.remove('hidden');
}
function hideError() {
  document.getElementById('error-msg').classList.add('hidden');
}
function togglePwd() {
  const inp  = document.getElementById('password');
  const icon = document.getElementById('pwd-icon');
  if (inp.type === 'password') { inp.type = 'text';     icon.textContent = 'visibility_off'; }
  else                         { inp.type = 'password'; icon.textContent = 'visibility'; }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
