<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Criar conta — AirGuia</title>
<link href="assets/airguia-favicon.png" rel="icon" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: { primary: "#4A6741", "primary-light": "#6B8E61" },
      fontFamily: { serif: ["'DM Serif Display'","serif"], sans: ["'Nunito Sans'","sans-serif"] }
    }
  }
}
</script>
<link rel="stylesheet" href="css/cadastro.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-stone-100 to-stone-50 flex flex-col items-center justify-center p-4">

<div class="w-full max-w-sm">

  <!-- Logo -->
  <div class="text-center mb-8">
    <img src="assets/airguia-logo-horizontal.png" alt="AirGuia" class="h-12 mx-auto mb-4">
    <h1 class="font-serif text-2xl text-gray-900 mb-1">Crie sua conta</h1>
    <p class="text-sm text-gray-500">Preencha os dados para começar</p>
  </div>

  <!-- Step progress -->
  <div class="flex items-center justify-center gap-0 mb-8">
    <div class="flex flex-col items-center">
      <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-xs font-extrabold shadow-sm">1</div>
      <span class="text-[10px] font-bold text-primary mt-1">Conta</span>
    </div>
    <div class="w-10 h-0.5 bg-gray-200 mb-4"></div>
    <div class="flex flex-col items-center">
      <div class="w-8 h-8 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center text-xs font-extrabold">2</div>
      <span class="text-[10px] font-bold text-gray-400 mt-1">Plano</span>
    </div>
    <div class="w-10 h-0.5 bg-gray-200 mb-4"></div>
    <div class="flex flex-col items-center">
      <div class="w-8 h-8 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center text-xs font-extrabold">3</div>
      <span class="text-[10px] font-bold text-gray-400 mt-1">Pagamento</span>
    </div>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <div id="error-msg" class="hidden mb-5 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm flex items-center gap-2">
      <span class="material-icons-outlined text-base">error_outline</span>
      <span id="error-text"></span>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">E-mail</label>
        <input id="reg-email" type="email" placeholder="seu@email.com" autocomplete="email"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/25 focus:border-primary transition-all bg-gray-50 focus:bg-white"/>
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Senha</label>
        <div class="relative">
          <input id="reg-senha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/25 focus:border-primary transition-all bg-gray-50 focus:bg-white pr-10"/>
          <button type="button" onclick="togglePwd('reg-senha','icon-pwd')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <span id="icon-pwd" class="material-icons-outlined text-base">visibility</span>
          </button>
        </div>
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Celular / WhatsApp</label>
        <input id="reg-celular" type="tel" placeholder="(84) 99999-9999" autocomplete="tel" maxlength="15" oninput="maskPhone(this)"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/25 focus:border-primary transition-all bg-gray-50 focus:bg-white"/>
      </div>
    </div>

    <button id="btn-next" onclick="avancar()"
      class="w-full mt-6 bg-primary text-white font-bold py-3.5 rounded-xl hover:bg-primary-light active:scale-[.98] transition-all flex items-center justify-center gap-2 text-sm shadow-lg shadow-primary/20">
      <span class="material-icons-outlined text-base">arrow_forward</span>
      Próximo
    </button>
  </div>

  <p class="text-center text-xs text-gray-400 mt-5">
    Já tem conta?
    <a href="login.html" class="text-primary font-bold hover:underline">Entrar</a>
  </p>
</div>

<script src="js/cadastro.js"></script>
</body>
</html>
